name: Build Nexus Blog

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "astro.config.mjs"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
