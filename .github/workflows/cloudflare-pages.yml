name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Check Cloudflare credentials
        id: cloudflare
        shell: bash
        run: |
          if [[ -z "$CLOUDFLARE_ACCOUNT_ID" || -z "$CLOUDFLARE_API_TOKEN" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Cloudflare deploy skipped: add CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_TOKEN repository secrets."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.cloudflare.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.cloudflare.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        if: steps.cloudflare.outputs.configured == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.4
          run_install: false

      - name: Install dependencies
        if: steps.cloudflare.outputs.configured == 'true'
        run: pnpm install --no-frozen-lockfile

      - name: Build site
        if: steps.cloudflare.outputs.configured == 'true'
        run: pnpm run build

      - name: Deploy to Cloudflare Pages
        if: steps.cloudflare.outputs.configured == 'true'
        run: pnpm exec wrangler pages deploy dist --project-name=xiaoqi-blog --branch=main --commit-dirty=true
